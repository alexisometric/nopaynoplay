name: Release

on:
  push:
    tags: ['v*.*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0.0)'
        required: true
      target_abi:
        description: 'Jellyfin target ABI'
        required: true
        default: '10.11.9.0'

# Single shared group (not per-ref) so two close releases queue instead of racing
# the manifest commit/push on main.
concurrency:
  group: release-manifest
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        env:
          # Pass user-controlled workflow_dispatch inputs through the environment
          # instead of interpolating them straight into the shell, then validate the
          # format strictly so a crafted "version" can't inject shell commands.
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_ABI: ${{ inputs.target_abi }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="$INPUT_VERSION"
            ABI="$INPUT_ABI"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            # Source of truth: src/meta.json. Falls back to 10.11.9.0 if absent.
            ABI=$(jq -r '.targetAbi' src/meta.json 2>/dev/null || echo '10.11.9.0')
            [[ -z "$ABI" || "$ABI" == "null" ]] && ABI='10.11.9.0'
          fi
          # Strict X.Y.Z.W validation — rejects anything with shell metacharacters.
          [[ "$VERSION" =~ ^[0-9]+(\.[0-9]+){3}$ ]] || { echo "Invalid version: $VERSION" >&2; exit 1; }
          [[ "$ABI" =~ ^[0-9]+(\.[0-9]+){3}$ ]] || { echo "Invalid ABI: $ABI" >&2; exit 1; }
          {
            echo "version=$VERSION"
            echo "abi=$ABI"
          } >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Test
        run: dotnet test tests/Jellyfin.Plugin.NoPayNoPlay.Tests.csproj -c Release

      - name: Package
        env:
          TARGET_ABI: ${{ steps.ver.outputs.abi }}
        run: ./scripts/build.sh "${{ steps.ver.outputs.version }}"

      - name: Compute checksums
        id: sum
        run: |
          ZIP="artifacts/nopaynoplay_${{ steps.ver.outputs.version }}.zip"
          MD5=$(md5sum "$ZIP" | awk '{print $1}')
          SHA256=$(sha256sum "$ZIP" | awk '{print $1}')
          SIZE=$(stat -c%s "$ZIP")
          {
            echo "md5=$MD5"
            echo "sha256=$SHA256"
            echo "size=$SIZE"
          } >> "$GITHUB_OUTPUT"

      - name: Build release notes
        id: notes
        env:
          TAG: v${{ steps.ver.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          PREV_TAG=$(git tag --list 'v*.*.*.*' --sort=-version:refname | grep -vFx "$TAG" | head -n1 || true)
          if [[ -n "$PREV_TAG" ]]; then
            RANGE="${PREV_TAG}..${TAG}"
            COMPARE="https://github.com/${REPO}/compare/${PREV_TAG}...${TAG}"
          else
            RANGE="$TAG"
            COMPARE="https://github.com/${REPO}/commits/${TAG}"
          fi

          # Collect commits as "<short-sha><TAB><subject>" lines.
          mapfile -t COMMITS < <(git log --no-merges --pretty=format:'%h%x09%s' "$RANGE" 2>/dev/null || true)

          declare -A SECTIONS=(
            [feat]="### Features"
            [fix]="### Bug fixes"
            [perf]="### Performance"
            [refactor]="### Refactoring"
            [docs]="### Documentation"
            [test]="### Tests"
            [build]="### Build"
            [ci]="### CI"
            [chore]="### Chores"
          )
          ORDER=(feat fix perf refactor docs test build ci chore other)

          declare -A BUCKETS=()
          cc_re='^([a-z]+)(\([^)]+\))?!?:[[:space:]]*(.*)$'
          for line in "${COMMITS[@]}"; do
            [[ -z "$line" ]] && continue
            sha="${line%%	*}"
            subject="${line#*	}"
            # Skip the auto manifest commit.
            if [[ "$subject" == *"[skip ci]"* ]]; then continue; fi
            type="other"
            if [[ "$subject" =~ $cc_re ]]; then
              t="${BASH_REMATCH[1]}"
              rest="${BASH_REMATCH[3]}"
              if [[ -n "${SECTIONS[$t]:-}" ]]; then
                type="$t"
                subject="$rest"
              fi
            fi
            BUCKETS[$type]+="- ${subject} (${sha})"$'\n'
          done

          {
            echo "## What's changed"
            echo
            any=0
            for t in "${ORDER[@]}"; do
              content="${BUCKETS[$t]:-}"
              [[ -z "$content" ]] && continue
              any=1
              if [[ "$t" == "other" ]]; then
                echo "### Other"
              else
                echo "${SECTIONS[$t]}"
              fi
              echo
              printf '%s' "$content"
              echo
            done
            if [[ $any -eq 0 ]]; then
              echo "_No notable changes._"
              echo
            fi
            echo "**Full changelog:** ${COMPARE}"
          } > release-notes.md

          echo "path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: gh_release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: NoPayNoPlay ${{ steps.ver.outputs.version }}
          files: artifacts/nopaynoplay_${{ steps.ver.outputs.version }}.zip
          body_path: ${{ steps.notes.outputs.path }}

      - name: Update manifest.json
        env:
          TARGET_ABI: ${{ steps.ver.outputs.abi }}
          CHANGELOG: 'See release notes at ${{ steps.gh_release.outputs.url }}'
        run: |
          ZIP_URL="https://github.com/${{ github.repository }}/releases/download/v${{ steps.ver.outputs.version }}/nopaynoplay_${{ steps.ver.outputs.version }}.zip"
          ./scripts/update-manifest.sh "${{ steps.ver.outputs.version }}" "$ZIP_URL" "${{ steps.sum.outputs.md5 }}"

      - name: Commit manifest
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add manifest.json
          if git diff --cached --quiet; then
            echo "manifest.json unchanged; nothing to commit"
            exit 0
          fi
          git commit -m "chore: publish ${VERSION} in manifest [skip ci]"
          # Resilient push: if another release landed on main first, rebase and retry
          # so neither manifest entry is lost (the singleton concurrency group makes
          # this rare, but this is the safety net).
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "push rejected (attempt ${attempt}); rebasing onto origin/main"
            git pull --rebase origin main
          done
          echo "manifest push failed after retries" >&2
          exit 1

      - name: Job summary
        run: |
          {
            echo "### Release ${{ steps.ver.outputs.version }}"
            echo ""
            echo "- Asset: \`nopaynoplay_${{ steps.ver.outputs.version }}.zip\`"
            echo "- Size: ${{ steps.sum.outputs.size }} bytes"
            echo "- MD5: \`${{ steps.sum.outputs.md5 }}\`"
            echo "- SHA256: \`${{ steps.sum.outputs.sha256 }}\`"
            echo "- URL: ${{ steps.gh_release.outputs.url }}"
          } >> "$GITHUB_STEP_SUMMARY"
