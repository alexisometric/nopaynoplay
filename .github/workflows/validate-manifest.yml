name: Validate manifest

on:
  pull_request:
    paths:
      - 'manifest.json'

concurrency:
  group: validate-manifest-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate manifest entries
        run: |
          python3 - <<'PY'
          import json, pathlib, urllib.request

          data = json.loads(pathlib.Path("manifest.json").read_text())
          assert isinstance(data, list) and data, "manifest must be a non-empty list"
          plugin = data[0]
          required = {"guid", "name", "owner", "category", "versions"}
          missing = required - plugin.keys()
          assert not missing, f"missing keys: {missing}"
          assert plugin["guid"] == "f3b4d2c1-7e9a-4b1e-9c6d-9a1b2c3d4e5f", "GUID drift"
          for entry in plugin["versions"]:
              for key in ("version", "changelog", "targetAbi", "sourceUrl", "checksum", "timestamp"):
                  assert key in entry, f"version missing key {key}"
              url = entry["sourceUrl"]
              print(f"checking {url}")
              req = urllib.request.Request(url, method="HEAD")
              with urllib.request.urlopen(req, timeout=20) as resp:
                  assert resp.status == 200, f"asset not reachable: {url}"
          print("manifest OK")
          PY
