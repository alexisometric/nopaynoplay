name: Validate manifest

on:
  pull_request:
    paths:
      - 'manifest.json'

concurrency:
  group: validate-manifest-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Validate manifest entries
        run: |
          python3 - <<'PY'
          import json, hashlib, pathlib, urllib.request

          data = json.loads(pathlib.Path("manifest.json").read_text())
          assert isinstance(data, list) and data, "manifest must be a non-empty list"
          plugin = data[0]
          required = {"guid", "name", "owner", "category", "versions"}
          missing = required - plugin.keys()
          assert not missing, f"missing keys: {missing}"
          assert plugin["guid"] == "f3b4d2c1-7e9a-4b1e-9c6d-9a1b2c3d4e5f", "GUID drift"

          versions = plugin["versions"]
          assert versions, "no versions in manifest"
          for entry in versions:
              for key in ("version", "changelog", "targetAbi", "sourceUrl", "checksum", "timestamp"):
                  assert key in entry, f"version missing key {key}"

          # Fully verify the most recent version: download the asset and confirm its
          # MD5 matches the declared checksum, so a wrong/stale checksum (which would
          # make Jellyfin refuse the install) fails CI instead of shipping silently.
          latest = versions[0]
          url = latest["sourceUrl"]
          print(f"downloading {url}")
          with urllib.request.urlopen(url, timeout=120) as resp:
              assert resp.status == 200, f"asset not reachable: {url}"
              content = resp.read()
          got = hashlib.md5(content).hexdigest()
          assert got == latest["checksum"], f"checksum mismatch: declared {latest['checksum']} got {got}"
          print(f"checksum OK for {latest['version']} ({got})")

          # Older versions: only confirm reachability (avoid re-downloading everything).
          for entry in versions[1:]:
              url = entry["sourceUrl"]
              print(f"checking {url}")
              req = urllib.request.Request(url, method="HEAD")
              with urllib.request.urlopen(req, timeout=20) as resp:
                  assert resp.status == 200, f"asset not reachable: {url}"
          print("manifest OK")
          PY
