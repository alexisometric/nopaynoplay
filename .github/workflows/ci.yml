name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'manifest.json'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/FUNDING.yml'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/FUNDING.yml'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.NoPayNoPlay.sln

      - name: Build
        run: dotnet build Jellyfin.Plugin.NoPayNoPlay.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/Jellyfin.Plugin.NoPayNoPlay.Tests.csproj -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Job summary
        if: always()
        run: |
          {
            echo "### CI summary"
            echo ""
            echo "- Commit: \`${GITHUB_SHA::7}\`"
            echo "- .NET: 9.0.x"
          } >> "$GITHUB_STEP_SUMMARY"

  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - name: Lint workflows
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color
